<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Welcome to ITI Shop</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f4;font-family:Arial,sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f4;padding:30px 0;">
        <tr>
            <td align="center">
                <table width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">
                    <!-- Header -->
                    <tr>
                        <td style="background-color:#007bff;padding:30px;text-align:center;">
                            <h1 style="margin:0;color:#ffffff;font-size:26px;letter-spacing:1px;">ITI Shop</h1>
                        </td>
                    </tr>
                    <!-- Body -->
                    <tr>
                        <td style="padding:40px 40px 30px;">
                            <h2 style="color:#333333;margin-top:0;">Welcome, {{name}}!</h2>
                            <p style="color:#555555;line-height:1.6;font-size:15px;">
                                Thank you for creating your account. You're all set to start exploring our latest products.
                            </p>
                            <div style="text-align:center;margin:30px 0;">
                                <a href="{{action_url}}"
                                   style="display:inline-block;padding:14px 32px;background-color:#007bff;color:#ffffff;text-decoration:none;border-radius:5px;font-size:15px;font-weight:bold;">
                                    Start Shopping
                                </a>
                            </div>
                            <p style="color:#888888;font-size:13px;">
                                If the button above doesn't work, paste this link into your browser:<br />
                                <a href="{{action_url}}" style="color:#007bff;">{{action_url}}</a>
                            </p>
                        </td>
                    </tr>
                    <!-- Footer -->
                    <tr>
                        <td style="background-color:#f8f8f8;padding:20px 40px;text-align:center;border-top:1px solid #eeeeee;">
                            <p style="margin:0;color:#aaaaaa;font-size:12px;">© 2026 ITI Shop. All rights reserved.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
